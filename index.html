<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DIGIT</title>
<style>
  :root { --teal:#27d3e6; --orange:#F26334; --bg:#020a0e; --panel:#04141b; --dim:#5e96a1; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    background:radial-gradient(ellipse at 50% 22%, #062430 0%, var(--bg) 60%);
    color:#cfeef4; font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  /* ── PIN / boot overlay ── */
  #gate {
    position:fixed; inset:0; background:var(--bg); z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    font-family:ui-monospace,Menlo,monospace;
  }
  #bootlog { font-size:11px; color:var(--dim); line-height:1.9; min-height:120px; text-align:left; width:260px; }
  #bootlog .ok { color:var(--teal); }
  #pinRow { display:flex; gap:8px; }
  #pin {
    width:200px; background:var(--panel); border:1px solid rgba(39,211,230,.4); border-radius:10px;
    color:var(--teal); padding:12px 14px; font-size:16px; letter-spacing:.2em; text-align:center;
    font-family:inherit; outline:none; text-transform:uppercase;
  }
  #pinGo { padding:0 18px; border-radius:10px; border:1px solid var(--teal); background:rgba(39,211,230,.12); color:var(--teal); font-size:15px; cursor:pointer; }
  #gateErr { color:var(--orange); font-size:11px; height:14px; letter-spacing:.1em; }

  /* ── Header ── */
  header {
    display:flex; align-items:baseline; justify-content:space-between;
    padding:12px 16px 6px; border-bottom:1px solid rgba(39,211,230,.12);
  }
  header h1 { font-size:15px; letter-spacing:.5em; color:var(--teal); font-weight:600; }
  header h1 b { color:var(--orange); font-weight:600; }
  #ticker { font-size:9px; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; transition:color .3s; }
  #ticker.alert { color:var(--orange); }

  /* ── Barcode HUD ── */
  #hud { position:relative; height:170px; flex:0 0 auto; }
  canvas { display:block; width:100%; height:100%; }
  .corner { position:absolute; width:16px; height:16px; border:1.5px solid rgba(39,211,230,.5); }
  .c1{top:8px;left:10px;border-right:0;border-bottom:0}.c2{top:8px;right:10px;border-left:0;border-bottom:0}
  .c3{bottom:8px;left:10px;border-right:0;border-top:0}.c4{bottom:8px;right:10px;border-left:0;border-top:0}
  #toggles { position:absolute; top:12px; right:22px; display:flex; gap:6px; z-index:2; }
  .tog {
    font-size:10px; letter-spacing:.18em; padding:5px 11px; border-radius:999px;
    border:1px solid rgba(39,211,230,.35); color:var(--dim); background:rgba(2,10,14,.6); cursor:pointer;
  }
  .tog.on { color:#02141a; background:var(--teal); box-shadow:0 0 12px rgba(39,211,230,.6); }

  /* ── Chat ── */
  #chat { flex:1; overflow-y:auto; padding:8px 14px 12px; -webkit-overflow-scrolling:touch; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:88%; padding:10px 13px; border-radius:14px; font-size:14.5px; line-height:1.5; white-space:pre-wrap; }
  .user { align-self:flex-end; background:rgba(39,211,230,.13); border:1px solid rgba(39,211,230,.35); border-bottom-right-radius:4px; }
  .digit { align-self:flex-start; background:var(--panel); border:1px solid rgba(39,211,230,.15); border-bottom-left-radius:4px; border-left:2px solid var(--orange); }
  .digit.thinking { color:var(--dim); font-style:italic; border-left-color:rgba(39,211,230,.3); }

  /* ── Chips + input ── */
  #chips { display:flex; gap:8px; overflow-x:auto; padding:6px 14px; flex:0 0 auto; scrollbar-width:none; }
  #chips::-webkit-scrollbar { display:none; }
  .chip { flex:0 0 auto; font-size:12px; color:var(--teal); border:1px solid rgba(39,211,230,.4); border-radius:999px; padding:7px 13px; background:rgba(39,211,230,.06); cursor:pointer; }
  #bar { display:flex; gap:8px; align-items:center; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid rgba(39,211,230,.12); flex:0 0 auto; background:rgba(2,10,14,.85); }
  #q { flex:1; background:var(--panel); border:1px solid rgba(39,211,230,.3); border-radius:22px; color:#e6f8fb; padding:11px 16px; font-size:15px; outline:none; }
  .btn { width:44px; height:44px; flex:0 0 auto; border-radius:50%; border:1px solid rgba(39,211,230,.45); background:rgba(39,211,230,.1); color:var(--teal); font-size:17px; cursor:pointer; transition:all .2s; }
  .btn.active { background:var(--orange); border-color:var(--orange); color:#fff; box-shadow:0 0 18px rgba(242,99,52,.8); animation:pulse 1.2s infinite; }
  @keyframes pulse { 50% { box-shadow:0 0 30px rgba(242,99,52,1); } }

  /* ── Signals board ── */
  #board {
    position:fixed; top:0; right:0; bottom:0; width:300px; z-index:30;
    background:rgba(2,12,17,.97); border-left:1px solid rgba(39,211,230,.18);
    transform:translateX(100%); transition:transform .25s ease;
    display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom);
  }
  #board.open { transform:none; box-shadow:-12px 0 40px rgba(0,0,0,.6); }
  #boardHead {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 14px 10px; font-size:11px; letter-spacing:.25em; color:var(--teal);
  }
  #boardHead .meta { font-size:9px; letter-spacing:.12em; color:var(--dim); }
  #boardClose { background:none; border:none; color:var(--dim); font-size:16px; cursor:pointer; }
  #netRow { padding:0 14px 10px; font-size:10px; letter-spacing:.15em; color:var(--dim); }
  #netRow b { font-family:ui-monospace,Menlo,monospace; font-size:13px; }
  #tiles { flex:1; overflow-y:auto; padding:0 10px 14px; display:flex; flex-direction:column; gap:7px; }
  .tile {
    border:1px solid rgba(39,211,230,.15); border-left:3px solid var(--dim);
    border-radius:9px; padding:9px 11px; background:rgba(4,20,27,.8); cursor:pointer;
  }
  .tile:active { background:rgba(39,211,230,.08); }
  .tile .row1 { display:flex; justify-content:space-between; align-items:baseline; }
  .tile .sid { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--dim); letter-spacing:.08em; }
  .tile .score { font-family:ui-monospace,Menlo,monospace; font-size:14px; font-weight:700; }
  .tile .nm { font-size:12px; line-height:1.35; color:#d8f1f6; margin-top:2px; }
  .tile .st { font-size:9.5px; color:var(--dim); margin-top:3px; letter-spacing:.04em; }
  .tile.pos { border-left-color:#3ddc97; } .tile.pos .score { color:#3ddc97; }
  .tile.neg { border-left-color:var(--orange); } .tile.neg .score { color:var(--orange); }
  .tile.zero { border-left-color:var(--teal); } .tile.zero .score { color:var(--teal); }
  .tile.off { opacity:.42; border-left-style:dashed; }
  .tile.hot { box-shadow:inset 0 0 18px rgba(242,99,52,.12); }
  /* Desktop: board becomes a permanent right rail */
  @media (min-width: 900px) {
    body { padding-right:300px; }
    #board { transform:none; box-shadow:none; }
    #boardClose, #sigTog { display:none; }
  }
</style>
</head>
<body>

<div id="gate">
  <div id="bootlog"></div>
  <div id="pinRow" style="display:none">
    <input id="pin" placeholder="ACCESS CODE" autocomplete="off">
    <button id="pinGo">→</button>
  </div>
  <div id="gateErr"></div>
</div>

<header><h1>D I G I <b>T</b></h1><span id="ticker">INITIALIZING</span></header>

<div id="hud">
  <canvas id="bars"></canvas>
  <div class="corner c1"></div><div class="corner c2"></div><div class="corner c3"></div><div class="corner c4"></div>
  <div id="toggles">
    <div class="tog" id="sigTog">SIGNALS</div>
    <div class="tog" id="liveTog">LIVE</div>
    <div class="tog on" id="voiceTog">VOICE</div>
  </div>
</div>

<div id="board">
  <div id="boardHead">
    <span>SIGNAL BOARD</span>
    <span class="meta" id="boardMeta"></span>
    <button id="boardClose">✕</button>
  </div>
  <div id="netRow"></div>
  <div id="tiles"></div>
</div>

<div id="chat"></div>

<div id="chips">
  <div class="chip" data-q="Give me this morning's signals briefing — top movers, scores, and what needs my attention this week.">Morning briefing</div>
  <div class="chip" data-live="1" data-q="What has changed today across the signals? Search for developments since the last tracker refresh and compare against tracker state.">What changed today?</div>
  <div class="chip" data-q="What are the top 3 risks right now and the single most important next step for each?">Top risks</div>
  <div class="chip" data-q="What near-term trigger dates and deadlines are coming up in the next 30 days across all signals?">Upcoming triggers</div>
  <div class="chip" data-q="Which A/B tests and ODP actions should the team prioritize this sprint, and why?">Sprint priorities</div>
</div>

<div id="bar">
  <button class="btn" id="mic">🎙</button>
  <input id="q" placeholder="Ask DIGIT…" autocomplete="off">
  <button class="btn" id="send">➤</button>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// CONFIG — paste your Apps Script web app URL (ends in /exec)
var API_URL = "https://script.google.com/macros/s/AKfycbwNuKNt1JekuCEsKVCkKD_uU_5JuXdybq7UQvEYiruy6U20S6incWT-k91Nc22jy-vOKA/exec";
// ════════════════════════════════════════════════════════════════════════════

var convo = [], busy = false, live = false, voiceOn = true, speaking = false, micMode = false;
var token = localStorage.getItem('digit_token') || '';
var chat = document.getElementById('chat'), q = document.getElementById('q');
var ticker = document.getElementById('ticker');
var TICKS = ['GS1 SIGNALS ONLINE','CHECK DIGIT VALID','MONITORING DEMAND VECTORS','SUNRISE 2027 T-MINUS','ODP LINK STABLE'];
var tickIdx = 0;
setInterval(function(){ if(!busy && !speaking){ ticker.textContent = TICKS[tickIdx++ % TICKS.length]; } }, 5000);
function setTicker(t, alert){ ticker.textContent = t; ticker.classList.toggle('alert', !!alert); }

// ── BOOT GATE ────────────────────────────────────────────────────────────────
var bootLines = ['> DIGIT v2.0','> Demand & Industry GS1 Intelligence Tracker','> calibrating check digits ........ <span class="ok">MOD-10 OK</span>','> linking signals tracker ......... <span class="ok">LINKED</span>','> voice synthesis ................. <span class="ok">READY</span>','> awaiting authorization'];
var bl = document.getElementById('bootlog'), li = 0;
(function bootStep(){
  if (li < bootLines.length) { bl.innerHTML += bootLines[li++] + '<br>'; setTimeout(bootStep, 260); }
  else if (token) { tryAuth(token); }
  else { document.getElementById('pinRow').style.display = 'flex'; }
})();
function tryAuth(t) {
  api({ token: t, action: 'ping' }, function (r) {
    if (r && r.ok) {
      token = t; localStorage.setItem('digit_token', t);
      document.getElementById('gate').style.display = 'none';
      renderBoard(r);
      setTicker('GS1 SIGNALS ONLINE');
      var greet = "Good day, sir. DIGIT online — " + r.active + " active signals of " + r.total +
        " tracked, net composite " + (r.net > 0 ? "+" : "") + r.net +
        ". Ask away, or enable LIVE and I'll sweep for intraday developments.";
      bubble('digit', greet, true); convo.push({ role: 'model', text: greet });
    } else {
      localStorage.removeItem('digit_token');
      document.getElementById('pinRow').style.display = 'flex';
      document.getElementById('gateErr').textContent = 'ACCESS DENIED — CHECK CODE';
    }
  }, function () {
    document.getElementById('pinRow').style.display = 'flex';
    document.getElementById('gateErr').textContent = 'API UNREACHABLE — CHECK API_URL';
  });
}

// ── SIGNALS BOARD ────────────────────────────────────────────────────────────
function renderBoard(d) {
  if (!d.signals) return;
  TICKS = ['GS1 SIGNALS ONLINE', d.active + ' ACTIVE / ' + d.total + ' TRACKED',
           'NET COMPOSITE ' + (d.net > 0 ? '+' : '') + d.net, 'CHECK DIGIT VALID',
           'MONITORING DEMAND VECTORS', 'REFRESHED ' + (d.refreshed || '').toUpperCase()];
  document.getElementById('boardMeta').textContent = d.active + ' ACTIVE / ' + d.total;
  document.getElementById('netRow').innerHTML = 'NET COMPOSITE (ACTIVE): <b style="color:' +
    (d.net > 0 ? '#3ddc97' : d.net < 0 ? 'var(--orange)' : 'var(--teal)') + '">' +
    (d.net > 0 ? '+' : '') + d.net + '</b> &nbsp;·&nbsp; ' + (d.refreshed || '');
  var tiles = document.getElementById('tiles'); tiles.innerHTML = '';
  d.signals.slice().sort(function (a, b) { return (b.active - a.active) || (Math.abs(b.score) - Math.abs(a.score)); })
    .forEach(function (s) {
      var div = document.createElement('div');
      var cls = s.score > 0 ? 'pos' : s.score < 0 ? 'neg' : 'zero';
      var hot = /escalating|imminent/i.test(s.status);
      div.className = 'tile ' + cls + (s.active ? '' : ' off') + (hot && s.active ? ' hot' : '');
      div.innerHTML = '<div class="row1"><span class="sid">' + s.id + ' · ' + s.cat + '</span>' +
        '<span class="score">' + (s.score > 0 ? '+' : '') + s.score + '</span></div>' +
        '<div class="nm">' + s.name + '</div>' +
        '<div class="st">' + s.status + (s.updated ? ' · upd ' + s.updated : '') + '</div>';
      div.onclick = function () {
        document.getElementById('board').classList.remove('open');
        q.value = 'Give me the full picture on ' + s.id + ' (' + s.name + ') — current state, why the score is ' +
          (s.score > 0 ? '+' : '') + s.score + ', and our next best action.';
        ask();
      };
      tiles.appendChild(div);
    });
}
function refreshBoard() { api({ token: token, action: 'signals' }, function (r) { if (r.ok) renderBoard(r); }); }
setInterval(function () { if (token && !busy) refreshBoard(); }, 5 * 60 * 1000); // re-sync every 5 min
document.getElementById('sigTog').onclick = function () { refreshBoard(); document.getElementById('board').classList.add('open'); };
document.getElementById('boardClose').onclick = function () { document.getElementById('board').classList.remove('open'); };
document.getElementById('pinGo').onclick = function(){ var v = document.getElementById('pin').value.trim(); if (v) tryAuth(v); };
document.getElementById('pin').addEventListener('keydown', function(e){ if (e.key==='Enter') document.getElementById('pinGo').click(); });

// ── API (text/plain avoids CORS preflight; Apps Script returns JSON) ────────
function api(body, onOk, onErr) {
  fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(body) })
    .then(function(r){ return r.json(); }).then(onOk)
    .catch(onErr || function(){ onOk({ ok:false, text:'Network error.' }); });
}

// ── BARCODE EQUALIZER HUD ────────────────────────────────────────────────────
var cv = document.getElementById('bars'), cx = cv.getContext('2d');
var NB = 56, widths = [], seeds = [];
for (var i = 0; i < NB; i++) { widths.push(Math.random() < 0.3 ? 2 : Math.random() < 0.7 ? 1 : 3); seeds.push(Math.random() * 6.28); }
var analyser = null, freq = null, scanX = 0, t = 0;
function drawHud() {
  var w = cv.clientWidth, h = cv.clientHeight, dpr = window.devicePixelRatio || 1;
  if (cv.width !== w*dpr) { cv.width = w*dpr; cv.height = h*dpr; }
  cx.setTransform(dpr,0,0,dpr,0,0); cx.clearRect(0,0,w,h); t += 0.016;
  var totalUnits = widths.reduce(function(a,b){return a+b+1;},0);
  var unit = Math.min(6, (w*0.78)/totalUnits), x = (w - totalUnits*unit)/2, mid = h/2, maxH = h*0.62;
  if (analyser && speaking) analyser.getByteFrequencyData(freq);
  for (var i = 0; i < NB; i++) {
    var amp;
    if (speaking && freq) { amp = 0.25 + 0.75*(freq[Math.floor(i/NB*freq.length*0.7)]/255); }
    else if (busy)        { amp = 0.3 + 0.18*Math.sin(t*3 + seeds[i]); }
    else                  { amp = 0.85 + 0.05*Math.sin(t*0.8 + seeds[i]); }
    var bh = maxH*amp, bw = widths[i]*unit;
    var orange = (i===2 || i===NB-3 || (speaking && i % 13 === 0));
    cx.fillStyle = orange ? 'rgba(242,99,52,.92)' : 'rgba(39,211,230,' + (0.55 + 0.4*amp) + ')';
    cx.fillRect(x, mid-bh/2, bw, bh);
    x += bw + unit;
  }
  if (busy) { // laser scanline sweep
    scanX = (scanX + w*0.012) % w;
    var g = cx.createLinearGradient(scanX-26,0,scanX+26,0);
    g.addColorStop(0,'rgba(242,99,52,0)'); g.addColorStop(.5,'rgba(242,99,52,.85)'); g.addColorStop(1,'rgba(242,99,52,0)');
    cx.fillStyle = g; cx.fillRect(scanX-26, h*0.12, 52, h*0.76);
  }
  // human-readable digits, UPC-style
  cx.fillStyle = 'rgba(94,150,161,.9)'; cx.font = '10px ui-monospace,Menlo,monospace'; cx.textAlign = 'center';
  cx.fillText(speaking ? '· SPEAKING ·' : busy ? '· SCANNING ·' : '0 GS1US · DIGIT · 2026 7', w/2, h-8);
  requestAnimationFrame(drawHud);
}
drawHud();

// ── AUDIO: Gemini PCM → WAV → WebAudio (drives the equalizer) ───────────────
var actx = null, curSrc = null;
function ensureCtx(){ if (!actx) { actx = new (window.AudioContext||window.webkitAudioContext)(); analyser = actx.createAnalyser(); analyser.fftSize = 128; freq = new Uint8Array(analyser.frequencyBinCount); analyser.connect(actx.destination); } if (actx.state==='suspended') actx.resume(); }
function playPcm(b64, rate, onDone) {
  ensureCtx();
  var bin = atob(b64), n = bin.length/2, buf = actx.createBuffer(1, n, rate), ch = buf.getChannelData(0);
  for (var i = 0; i < n; i++) { var lo = bin.charCodeAt(i*2), hi = bin.charCodeAt(i*2+1); var v = (hi<<8)|lo; if (v>=32768) v -= 65536; ch[i] = v/32768; }
  if (curSrc) { try{curSrc.stop();}catch(e){} }
  curSrc = actx.createBufferSource(); curSrc.buffer = buf; curSrc.connect(analyser);
  speaking = true; setTicker('DIGIT SPEAKING');
  curSrc.onended = function(){ speaking = false; setTicker('GS1 SIGNALS ONLINE'); if (onDone) onDone(); };
  curSrc.start();
}
function fallbackSpeak(text, onDone) { // browser voice if Gemini TTS unavailable
  if (!('speechSynthesis' in window)) { if (onDone) onDone(); return; }
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text.replace(/[*_#`]/g,'').slice(0,1200));
  var v = speechSynthesis.getVoices().find(function(x){ return /en-GB/i.test(x.lang); }); if (v) u.voice = v;
  u.rate = 1.04; u.pitch = 0.92;
  u.onstart = function(){ speaking = true; }; u.onend = u.onerror = function(){ speaking = false; if (onDone) onDone(); };
  speechSynthesis.speak(u);
}

// ── TYPEWRITER REVEAL ────────────────────────────────────────────────────────
function bubble(cls, text, type) {
  var d = document.createElement('div'); d.className = 'msg ' + cls;
  chat.appendChild(d);
  if (!type) { d.textContent = text; chat.scrollTop = chat.scrollHeight; return d; }
  var i = 0;
  (function tw(){ d.textContent = text.slice(0, i += 3); chat.scrollTop = chat.scrollHeight; if (i < text.length) setTimeout(tw, 14); })();
  return d;
}

// ── ASK ──────────────────────────────────────────────────────────────────────
function ask(forcedLive, fromMic) {
  var text = q.value.trim(); if (!text || busy) return;
  q.value = ''; busy = true; micMode = !!fromMic;
  ensureCtx();
  bubble('user', text); convo.push({ role: 'user', text: text });
  var isLive = live || forcedLive;
  var think = bubble('digit thinking', isLive ? 'Scanning live sources against the tracker…' : 'Running the numbers…');
  setTicker(isLive ? 'LIVE SWEEP IN PROGRESS' : 'PROCESSING', false);
  api({ token: token, history: convo, mode: isLive ? 'live' : 'chat', wantAudio: voiceOn }, function (r) {
    think.remove(); busy = false;
    if (!r.ok) {
      setTicker('ERROR', true); bubble('digit', r.text || 'Something went wrong.');
      if (r.code === 401) { localStorage.removeItem('digit_token'); location.reload(); }
      return;
    }
    setTicker('GS1 SIGNALS ONLINE');
    bubble('digit', r.text, true);
    convo.push({ role: 'model', text: r.text });
    var onDone = function(){ if (micMode && voiceOn && rec) setTimeout(startMic, 350); }; // conversation mode
    if (voiceOn && r.audio) playPcm(r.audio, r.sampleRate || 24000, onDone);
    else if (voiceOn) fallbackSpeak(r.text, onDone);
  });
}
document.getElementById('send').onclick = function(){ ask(); };
q.addEventListener('keydown', function(e){ if (e.key==='Enter') ask(); });

// ── MIC (native — works on this origin, unlike the Apps Script sandbox) ─────
var SR = window.SpeechRecognition || window.webkitSpeechRecognition, rec = null;
var micBtn = document.getElementById('mic');
function startMic() {
  if (busy || speaking) return;
  micBtn.classList.add('active'); setTicker('LISTENING', true);
  try { rec.start(); } catch(e) {}
}
if (SR) {
  rec = new SR(); rec.lang = 'en-US'; rec.interimResults = false;
  rec.onresult = function(e){ q.value = e.results[0][0].transcript; micBtn.classList.remove('active'); ask(false, true); };
  rec.onend = function(){ micBtn.classList.remove('active'); if (!busy && !speaking) setTicker('GS1 SIGNALS ONLINE'); };
  rec.onerror = function(e){ micBtn.classList.remove('active'); setTicker(e.error==='not-allowed' ? 'MIC PERMISSION DENIED' : 'MIC ERROR — TYPE INSTEAD', true); };
  micBtn.onclick = function(){
    if (micBtn.classList.contains('active')) { rec.stop(); micMode = false; return; }
    if (curSrc) { try{curSrc.stop();}catch(e){} speaking = false; }
    speechSynthesis && speechSynthesis.cancel();
    startMic();
  };
} else { micBtn.style.opacity = 0.3; micBtn.onclick = function(){ setTicker('VOICE INPUT NOT SUPPORTED', true); }; }

// ── TOGGLES + CHIPS ──────────────────────────────────────────────────────────
var liveTog = document.getElementById('liveTog'), voiceTog = document.getElementById('voiceTog');
liveTog.onclick = function(){ live = !live; liveTog.classList.toggle('on', live); };
voiceTog.onclick = function(){
  voiceOn = !voiceOn; voiceTog.classList.toggle('on', voiceOn);
  if (!voiceOn) { if (curSrc) { try{curSrc.stop();}catch(e){} } speechSynthesis && speechSynthesis.cancel(); speaking = false; micMode = false; }
};
document.querySelectorAll('.chip').forEach(function(c){
  c.onclick = function(){ q.value = c.getAttribute('data-q'); ask(c.getAttribute('data-live')==='1'); };
});
</script>
